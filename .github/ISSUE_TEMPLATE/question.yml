name: Question
description: Ask how Absoloop works or how to extend it
title: "[q] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: input
    id: docs-checked
    attributes:
      label: Docs already checked
      placeholder: README · docs/multi-provider.md · CONTRIBUTING.md
