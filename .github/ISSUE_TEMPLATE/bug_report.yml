name: Bug report
description: Something in Absoloop behaves incorrectly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please omit secrets, API keys, and full agent transcripts unless redacted.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Expected vs actual behavior.
      placeholder: |
        Expected: …
        Actual: …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps, commands, and Absoloop version/commit if known.
      placeholder: |
        1. absoloop …
        2. …
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Mission loop / runner
        - Mission Briefing UX
        - Multi-provider harness
        - Report / watch / status
        - Shortcuts / Codex Micro
        - Docs / packaging
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Python
      placeholder: macOS 15 · Python 3.11
  - type: textarea
    id: logs
    attributes:
      label: Logs / snippets
      description: Redacted stderr, ledger lines, or monitor phase — keep it short.
      render: text
